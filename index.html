<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 我的日本工具箱</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-dark: #e8849a;
    --pink: #f5b8c8;
    --cream: #fdf6ee;
    --brown: #7a4f3a;
    --tab-h: 60px;
    --header-h: 52px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'Noto Sans TC', sans-serif;
    background: #f0e8e0;
    overflow: hidden;
  }

  /* ── Header ── */
  .app-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--pink-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    box-shadow: 0 2px 12px rgba(100,40,40,0.2);
  }

  .app-title {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 17px;
    font-weight: 900;
    color: white;
    letter-spacing: 1px;
  }

  /* ── iframe 容器 ── */
  .iframe-wrap {
    position: fixed;
    top: var(--header-h);
    bottom: var(--tab-h);
    left: 0; right: 0;
  }

  .iframe-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    background: var(--cream);
  }

  .iframe-wrap iframe.active {
    display: block;
  }

  /* ── Tab Bar ── */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--tab-h);
    background: white;
    border-top: 2px solid var(--pink);
    display: flex;
    z-index: 200;
    box-shadow: 0 -3px 14px rgba(100,40,40,0.10);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    border: none;
    background: none;
    color: #c0a090;
    transition: color 0.15s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  .tab-btn .icon { font-size: 22px; line-height: 1; }
  .tab-btn .label { font-size: 10px; font-weight: 700; font-family: 'Noto Sans TC', sans-serif; }

  .tab-btn.active { color: var(--pink-dark); }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    top: 0; left: 25%; right: 25%;
    height: 3px;
    background: var(--pink-dark);
    border-radius: 0 0 4px 4px;
  }
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="app-title">🐾 我的日本工具箱</div>
</header>

<!-- iframes -->
<div class="iframe-wrap">
  <iframe id="frame-0" class="active" src="chiikawa-gw.html"></iframe>
  <iframe id="frame-1"                src="receipt.html"></iframe>
  <iframe id="frame-2" src="product-check.html"></iframe>
  <!-- 新增工具：複製上面一行，改 id 和 src 即可 -->
</div>

<!-- Tab Bar -->
<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab(0)">
    <span class="icon">🐾</span>
    <span class="label">採購清單</span>
  </button>
  <button class="tab-btn" onclick="switchTab(1)">
    <span class="icon">🧾</span>
    <span class="label">發票掃描</span>
  </button>
  <button class="tab-btn" onclick="switchTab(2)">
  <span class="icon">🔍</span>
  <span class="label">查價</span>
</button>
  <!-- 新增 Tab：複製上面的 button，改 onclick 數字、icon 和 label -->
</nav>

<script>
  const LAST_TAB_KEY = 'japan-toolbox-tab';
  let current = parseInt(localStorage.getItem(LAST_TAB_KEY) || '0');

  const frames = document.querySelectorAll('.iframe-wrap iframe');
  const btns   = document.querySelectorAll('.tab-btn');

  function switchTab(idx) {
    frames.forEach((f, i) => f.classList.toggle('active', i === idx));
    btns.forEach((b, i)   => b.classList.toggle('active',  i === idx));
    current = idx;
    localStorage.setItem(LAST_TAB_KEY, idx);
  }

  // 還原上次開的頁籤
  if (current !== 0) switchTab(current);
</script>

</body>
</html>
