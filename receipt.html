<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>發票解析 - 總管強化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: #fdf6ee; color: #3d2b1f; min-height: 100vh; }
        body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, #e8d5c4 1px, transparent 1px); background-size: 24px 24px; opacity: 0.45; pointer-events: none; z-index: 0; }
        .container { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 20px 16px 48px; }
        .header { text-align: center; padding: 20px 0 18px; }
        .header h1 { font-size: 22px; font-weight: 900; color: #7a4f3a; }
        .header-sub { font-size: 12px; color: #a07060; margin-top: 4px; }
        .card { background: #ffffff; border-radius: 18px; padding: 16px 18px; margin-bottom: 14px; box-shadow: 0 3px 12px rgba(100,60,40,0.08); border: 2px solid #ead8c8; }
        .settings-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
        .settings-toggle-label { font-size: 13px; font-weight: 700; color: #7a4f3a; display: flex; align-items: center; gap: 6px; }
        .settings-arrow { color: #a07060; font-size: 12px; transition: transform 0.2s; }
        .settings-body { display: none; margin-top: 14px; }
        .settings-body.open { display: block; }
        .field { margin-bottom: 12px; }
        .field label { font-size: 11px; font-weight: 700; color: #a07060; display: block; margin-bottom: 4px; letter-spacing: 0.5px; }
        .field select, .field input { width: 100%; padding: 10px 12px; border: 1.5px solid #ead8c8; border-radius: 10px; font-size: 13px; background: #fdf6ee; outline: none; }
        .field input[type="password"] { font-family: monospace; letter-spacing: 2px; }
        .save-btn { width: 100%; padding: 10px; background: #e8849a; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 4px; }
        .preview-area { width: 100%; aspect-ratio: 4/3; border-radius: 12px; overflow: hidden; background: #f5ede4; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; border: 2px dashed #ead8c8; cursor: pointer; }
        .preview-area img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .preview-area img.show { display: block; }
        .cam-btns { display: flex; gap: 10px; }
        .cam-btn { flex: 1; padding: 11px; border: 2px solid #f5b8c8; background: white; border-radius: 12px; font-size: 13px; font-weight: 700; color: #e8849a; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .cam-btn.primary { background: #e8849a; color: white; border-color: #e8849a; }
        .loading-card { background: #ffffff; border-radius: 18px; padding: 32px; text-align: center; display: none; border: 2px solid #ead8c8; margin-bottom: 14px; }
        .loading-card.show { display: block; }
        .spinner { width: 36px; height: 36px; border: 3px solid #f5b8c8; border-top-color: #e8849a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .invoice-card { background: #ffffff; border-radius: 18px; padding: 16px; margin-bottom: 14px; box-shadow: 0 3px 12px rgba(100,60,40,0.08); border: 2px solid #b8e8d8; }
        .table-wrap { width: 100%; overflow-x: auto; border-radius: 10px; border: 1.5px solid #ead8c8; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
        th { background: #fff5f0; color: #e8849a; padding: 8px 10px; text-align: left; font-size: 11px; border-bottom: 1.5px solid #ead8c8; }
        td { padding: 8px 10px; border-bottom: 1px solid #f0e8e0; color: #3d2b1f; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .act-btn { padding: 10px 8px; border-radius: 10px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
        .act-btn.green { background: #dcfce7; color: #15803d; border: 1.5px solid #86efac; }
        .status-text { font-size: 13px; color: #a07060; text-align: center; min-height: 18px; margin-bottom: 4px; }
        .status-text.err { color: #e05050; }
        .inv-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-family: monospace; }
        .inv-badge.gemini { background: #dbeafe; color: #1d4ed8; }
        .inv-badge.claude { background: #d4c8f0; color: #4c1d95; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧾 發票解析</h1>
        <div class="header-sub">Gemini / Claude · 日本收據直連版</div>
    </div>

    <!-- API 設定區 -->
    <div class="card">
        <div class="settings-toggle" onclick="toggleSettings()">
            <span class="settings-toggle-label">⚙️ API 設定</span>
            <span id="settingsArrow">▾</span>
        </div>
        <div class="settings-body" id="settingsBody">
            <div class="field" style="margin-top:14px">
                <label>AI 引擎</label>
                <select id="engineSelect" onchange="switchEngine(this.value)">
                    <option value="gemini">Google Gemini</option>
                    <option value="claude">Anthropic Claude</option>
                </select>
            </div>
            <div class="field">
                <label>模型</label>
                <select id="modelSelect"></select>
            </div>
            <div class="field">
                <label>Gemini API Key</label>
                <input type="password" id="geminiKey" placeholder="AIza...">
            </div>
            <div class="field">
                <label>Claude API Key</label>
                <input type="password" id="claudeKey" placeholder="sk-ant-...">
            </div>
            <button class="save-btn" onclick="saveSettings()">💾 儲存設定</button>
        </div>
    </div>

    <!-- 拍照/選圖區 -->
    <div class="card">
        <div class="preview-area" id="previewArea" onclick="document.getElementById('galleryInput').click()">
            <img id="previewImg" alt="預覽">
            <div id="previewPlaceholder">📷 點擊選取發票</div>
        </div>
        <input type="file" id="galleryInput" hidden accept="image/*" onchange="onFileChange(event)">
        <input type="file" id="cameraInput" hidden accept="image/*" capture="environment" onchange="onFileChange(event)">
        <div class="cam-btns">
            <button class="cam-btn" onclick="document.getElementById('galleryInput').click()">🖼️ 選圖</button>
            <button class="cam-btn" onclick="document.getElementById('cameraInput').click()">📷 拍照</button>
            <button class="cam-btn primary" id="analyzeBtn" onclick="analyze()" disabled>🔍 解析</button>
        </div>
    </div>

    <div class="status-text" id="statusText"></div>
    <div class="loading-card" id="loadingCard">
        <div class="spinner"></div>
        <div id="loadingText">解析中...</div>
    </div>

    <div id="historyContainer"></div>
</div>

<script>
const CONFIG = {
    gemini: { key: 'receipt-gemini-key', models: [{v:'gemini-2.0-flash', l:'Gemini 2.0 Flash'}, {v:'gemini-1.5-flash', l:'Gemini 1.5 Flash'}] },
    claude: { key: 'receipt-claude-key', models: [{v:'claude-3-5-sonnet-20241022', l:'Claude 3.5 Sonnet'}, {v:'claude-3-haiku-20240307', l:'Claude 3 Haiku'}] }
};
const HIS_KEY = 'invoice_history_v2';
let base64Image = '', imageMime = 'image/jpeg', invoiceHistory = [];

// 初始化
(function() {
    const engine = localStorage.getItem('receipt-engine') || 'gemini';
    document.getElementById('engineSelect').value = engine;
    switchEngine(engine, true);
    try { invoiceHistory = JSON.parse(localStorage.getItem(HIS_KEY)) || []; } catch(e){}
    renderHistory();
})();

function toggleSettings() {
    const b = document.getElementById('settingsBody');
    b.classList.toggle('open');
    document.getElementById('settingsArrow').textContent = b.classList.contains('open') ? '▴' : '▾';
}

function switchEngine(engine, silent) {
    const cfg = CONFIG[engine];
    const sel = document.getElementById('modelSelect');
    sel.innerHTML = cfg.models.map(m => `<option value="${m.v}">${m.l}</option>`).join('');
    document.getElementById('geminiKey').value = localStorage.getItem(CONFIG.gemini.key) || '';
    document.getElementById('claudeKey').value = localStorage.getItem(CONFIG.claude.key) || '';
    if (!silent) localStorage.setItem('receipt-engine', engine);
}

function saveSettings() {
    localStorage.setItem(CONFIG.gemini.key, document.getElementById('geminiKey').value.trim());
    localStorage.setItem(CONFIG.claude.key, document.getElementById('claudeKey').value.trim());
    localStorage.setItem('receipt-engine', document.getElementById('engineSelect').value);
    localStorage.setItem('receipt-model-' + document.getElementById('engineSelect').value, document.getElementById('modelSelect').value);
    alert('設定已儲存');
    toggleSettings();
}

function onFileChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    imageMime = file.type;
    const reader = new FileReader();
    reader.onload = (e) => {
        base64Image = e.target.result.split(',')[1];
        const img = document.getElementById('previewImg');
        img.src = e.target.result; img.classList.add('show');
        document.getElementById('previewPlaceholder').style.display = 'none';
        document.getElementById('analyzeBtn').disabled = false;
    };
    reader.readAsDataURL(file);
}

async function analyze() {
    const engine = document.getElementById('engineSelect').value;
    const model = document.getElementById('modelSelect').value;
    const key = localStorage.getItem(CONFIG[engine].key);
    
    if (!key) { alert('請先設定 API Key'); toggleSettings(); return; }
    
    document.getElementById('loadingCard').classList.add('show');
    document.getElementById('statusText').textContent = '';

    const prompt = `解析此日本發票。嚴格輸出純 JSON 陣列，不准包含 markdown 標籤或任何前導文字。
格式：[{"date":"MM/DD","item":"店名 - 日文原文","translation":"繁體中文翻譯","price":數字}]
最後一筆為：{"date":"","item":"總計","translation":"","price":總金額}`;

    try {
        let rawText = '';
        if (engine === 'gemini') {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: imageMime, data: base64Image } }] }] })
            });
            const d = await res.json();
            rawText = d.candidates[0].content.parts[0].text;
        } else {
            const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
                body: JSON.stringify({ model, max_tokens: 1500, system: "You are a specialized JSON parser. Output only the raw JSON array. No preamble, no markdown blocks.", messages: [{ role: 'user', content: [{ type: 'image', source: { type: 'base64', media_type: imageMime, data: base64Image } }, { type: 'text', text: prompt }] }] })
            });
            const d = await res.json();
            rawText = d.content[0].text;
        }

        // 強效清洗：抓取第一個 [ 到最後一個 ]
        const jsonMatch = rawText.match(/\[[\s\S]*\]/);
        if (!jsonMatch) throw new Error("找不到有效的 JSON 格式，請重試");
        const parsedData = JSON.parse(jsonMatch[0]);

        invoiceHistory.unshift({ timestamp: Date.now(), engine, model, data: parsedData });
        localStorage.setItem(HIS_KEY, JSON.stringify(invoiceHistory));
        renderHistory();
        document.getElementById('statusText').textContent = '✅ 解析成功';
    } catch (err) {
        document.getElementById('statusText').textContent = '❌ 錯誤：' + err.message;
    }
    document.getElementById('loadingCard').classList.remove('show');
}

function renderHistory() {
    const container = document.getElementById('historyContainer');
    container.innerHTML = invoiceHistory.map((rec, idx) => `
        <div class="invoice-card">
            <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:8px">
                <span>🕐 ${new Date(rec.timestamp).toLocaleString()}</span>
                <span class="inv-badge ${rec.engine}">${rec.engine} · ${rec.model}</span>
            </div>
            <div class="table-wrap">
                <table>
                    <tr><th>日期</th><th>項目</th><th>翻譯</th><th>金額</th></tr>
                    ${rec.data.map(row => `<tr><td>${row.date}</td><td>${row.item}</td><td>${row.translation}</td><td>${row.price}</td></tr>`).join('')}
                </table>
            </div>
            <div class="action-grid">
                <button class="act-btn green" onclick="copyText(${idx})">📋 複製內容</button>
                <button class="act-btn" style="background:#fee2e2;color:#991b1b" onclick="deleteRec(${idx})">🗑️ 刪除</button>
            </div>
        </div>
    `).join('');
}

function copyText(idx) {
    const txt = invoiceHistory[idx].data.map(r => `${r.date} ${r.item} ${r.translation} ${r.price}`).join('\n');
    navigator.clipboard.writeText(txt);
    alert('已複製到剪貼簿');
}

function deleteRec(idx) {
    if(confirm('確定刪除？')) { invoiceHistory.splice(idx, 1); localStorage.setItem(HIS_KEY, JSON.stringify(invoiceHistory)); renderHistory(); }
}
</script>
</body>
</html>
