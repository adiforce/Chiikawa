<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>記帳</title>
    <link href="[https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap](https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap)" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; font-family: 'Noto Sans TC', sans-serif; background: #fdf6ee; overflow: hidden; }
        .page { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .top-section { background: #e8849a; padding: 14px 16px; flex-shrink: 0; }
        .section-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.85); margin-bottom: 10px; }
        .form-card { background: white; border-radius: 16px; padding: 14px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 2px 12px rgba(100,40,40,0.12); }
        .form-group { display: flex; flex-direction: column; gap: 4px; width: 100%; }
        label { font-size: 10px; font-weight: 700; color: #c0a090; }
        input, select { border: 1.5px solid #ead8c8; border-radius: 10px; padding: 10px 12px; font-size: 15px; color: #7a4f3a; background: #fdf6ee; width: 100%; outline: none; }
        input:focus, select:focus { border-color: #e8849a; background: white; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .jpy-row { display: flex; align-items: center; gap: 6px; }
        .jpy-op-btn { width: 40px; height: 40px; border-radius: 10px; border: 1.5px solid #f5b8c8; background: #fde8f0; color: #e8849a; font-size: 18px; font-weight: 700; }
        .jpy-tag { background: #fde8f0; border: 1px solid #f5b8c8; border-radius: 20px; padding: 2px 10px; font-size: 12px; color: #e8849a; margin-top: 4px; display: inline-block; }
        .submit-btn { background: #e8849a; color: white; border: none; border-radius: 12px; padding: 12px; font-size: 15px; font-weight: 700; margin-top: 5px; width: 100%; }
        .list-section { flex: 1; overflow-y: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch; }
        .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .total-badge { background: #fde8f0; border: 1.5px solid #f5b8c8; border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #e8849a; font-weight: 700; }
        .record-item { background: white; border-radius: 14px; border: 1.5px solid #ead8c8; padding: 11px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .record-info { flex: 1; min-width: 0; }
        .record-chinese { font-size: 13px; font-weight: 700; color: #7a4f3a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .record-jpy { font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 900; color: #e8849a; text-align: right; }
        .record-delete { background: none; border: 1.5px solid #f5b8c8; border-radius: 8px; color: #e8849a; font-size: 13px; padding: 4px 8px; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #7a4f3a; color: white; padding: 10px 20px; border-radius: 20px; transition: 0.3s; z-index: 999; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="page">
    <div class="top-section">
        <div class="section-title">✏️ 新增花費</div>
        <div class="form-card">
            <div class="form-row">
                <div class="form-group">
                    <label>日期 (月/日)</label>
                    <div class="jpy-row">
                        <input type="number" id="inp-month" placeholder="月" inputmode="numeric">
                        <input type="number" id="inp-day" placeholder="日" inputmode="numeric">
                    </div>
                </div>
                <div class="form-group">
                    <label>類別</label>
                    <select id="inp-category">
                        <option value="餐">🍜 餐</option><option value="玩">🎡 玩</option>
                        <option value="交">🚃 交</option><option value="雜">🛍 雜</option>
                        <option value="紀">🎁 紀</option><option value="住">🏨 住</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>金額 ¥</label>
                <div class="jpy-row">
                    <input type="number" id="inp-jpy" placeholder="0" inputmode="numeric">
                    <button type="button" class="jpy-op-btn" onclick="addItem()">＋</button>
                </div>
                <div id="jpy-items"></div>
            </div>
            <div class="form-group">
                <label>項目中文</label>
                <input type="text" id="inp-chinese" placeholder="例：藥妝店">
            </div>
            <button class="submit-btn" id="submit-btn" onclick="submitRecord()">➕ 新增紀錄</button>
        </div>
    </div>

    <div class="list-section">
        <div class="list-header">
            <span style="font-size: 13px; font-weight: 700; color: #7a4f3a;">📋 最近紀錄</span>
            <div class="total-badge" id="total-badge">合計 ¥0</div>
        </div>
        <div id="record-list"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const GAS_URL = "[https://script.google.com/macros/s/AKfycbwiDBMaW_iEgPia8GKpU5-j8mgEW474uQjmdD9LsemX0ezZRCqJWZ-p69HY3e1ZWC-k/exec](https://script.google.com/macros/s/AKfycbwiDBMaW_iEgPia8GKpU5-j8mgEW474uQjmdD9LsemX0ezZRCqJWZ-p69HY3e1ZWC-k/exec)";
    let jpyParts = [];

    const d = new Date();
    document.getElementById('inp-month').value = d.getMonth() + 1;
    document.getElementById('inp-day').value = d.getDate();

    function addItem() {
        const inp = document.getElementById('inp-jpy');
        const val = parseInt(inp.value);
        if (val > 0) {
            jpyParts.push(val);
            inp.value = '';
            renderTags();
        }
    }

    function renderTags() {
        const div = document.getElementById('jpy-items');
        div.innerHTML = jpyParts.map((v, i) => `<span class="jpy-tag" onclick="jpyParts.splice(${i},1);renderTags();">¥${v} ×</span>`).join(' ');
    }

    async function loadRecords() {
        const list = document.getElementById('record-list');
        list.innerHTML = '<div style="text-align:center;padding:20px;color:#c0a090;">讀取中...</div>';
        try {
            const res = await fetch(GAS_URL);
            const json = await res.json();
            if (json.success) {
                let total = 0;
                list.innerHTML = json.data.reverse().map(r => {
                    total += Number(r.jpy || 0);
                    return `<div class="record-item">
                        <div style="font-size:12px;color:#c0a090;width:35px;">${r.date.split('-').slice(1).join('/') || r.date}</div>
                        <div class="record-info"><div class="record-chinese">${r.chinese}</div></div>
                        <div class="record-jpy">¥${Number(r.jpy).toLocaleString()}</div>
                        <button class="record-delete" onclick="deleteRec(${r.row})">刪</button>
                    </div>`;
                }).join('');
                document.getElementById('total-badge').textContent = `合計 ¥${total.toLocaleString()}`;
            }
        } catch (e) { list.innerHTML = '載入失敗，請檢查網路'; }
    }

    async function submitRecord() {
        const currentJpy = parseInt(document.getElementById('inp-jpy').value) || 0;
        const total = jpyParts.reduce((a, b) => a + b, 0) + currentJpy;
        const chinese = document.getElementById('inp-chinese').value.trim();
        if (!total || !chinese) return showToast("請輸入金額與項目");

        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.textContent = "傳送中...";

        try {
            const params = new URLSearchParams({
                action: 'write',
                date: `${document.getElementById('inp-month').value}/${document.getElementById('inp-day').value}`,
                chinese: chinese,
                jpy: total,
                category: document.getElementById('inp-category').value
            });
            const res = await fetch(`${GAS_URL}?${params}`);
            const data = await res.json();
            if (data.success) {
                showToast("✅ 已儲存");
                jpyParts = []; document.getElementById('inp-jpy').value = ''; 
                document.getElementById('inp-chinese').value = '';
                renderTags(); loadRecords();
            }
        } catch (e) { showToast("❌ 錯誤"); }
        btn.disabled = false; btn.textContent = "➕ 新增紀錄";
    }

    function showToast(m) {
        const t = document.getElementById('toast'); t.textContent = m;
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function deleteRec(row) {
        if (!confirm("確定刪除？")) return;
        await fetch(`${GAS_URL}?action=delete&row=${row}`);
        loadRecords();
    }

    loadRecords();
</script>
</body>
</html>
