<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>記帳</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-dark: #e8849a;
    --pink: #f5b8c8;
    --cream: #fdf6ee;
    --brown: #7a4f3a;
    --light-brown: #c0a090;
    --border: #ead8c8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    overflow: hidden;
  }

  .page {
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 上方區塊 ── */
  .top-section {
    background: var(--pink-dark);
    padding: 14px 16px 16px;
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  /* ── 輸入表單 ── */
  .form-card {
    background: white;
    border-radius: 16px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 2px 12px rgba(100,40,40,0.12);
  }

  .form-row {
    display: flex;
    gap: 8px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .form-group.half { flex: 0 0 calc(50% - 4px); }
  .form-group.third { flex: 0 0 calc(33% - 6px); }

  label {
    font-size: 10px;
    font-weight: 700;
    color: var(--light-brown);
    letter-spacing: 0.5px;
  }

  input {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 9px 11px;
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--brown);
    background: var(--cream);
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: var(--pink-dark); background: white; }
  input::placeholder { color: #d0b8a8; font-size: 13px; }

  input[type="date"] { color: var(--brown); }

  .submit-btn {
    background: var(--pink-dark);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-size: 15px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .submit-btn:active { opacity: 0.85; transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.55; }

  /* ── 紀錄列表 ── */
  .list-section {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px 16px;
    -webkit-overflow-scrolling: touch;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .list-title {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--brown);
    letter-spacing: 1px;
  }

  .total-badge {
    background: #fde8f0;
    border: 1.5px solid var(--pink);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 700;
    color: var(--pink-dark);
    font-family: 'Zen Maru Gothic', sans-serif;
  }

  .record-item {
    background: white;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    padding: 11px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .record-date {
    font-size: 11px;
    font-weight: 700;
    color: var(--light-brown);
    flex-shrink: 0;
    min-width: 32px;
    text-align: center;
    line-height: 1.3;
  }

  .record-divider {
    width: 1.5px;
    height: 32px;
    background: var(--border);
    flex-shrink: 0;
  }

  .record-info {
    flex: 1;
    min-width: 0;
  }

  .record-chinese {
    font-size: 13px;
    font-weight: 700;
    color: var(--brown);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .record-original {
    font-size: 11px;
    color: var(--light-brown);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .record-jpy {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 15px;
    font-weight: 900;
    color: var(--pink-dark);
    flex-shrink: 0;
  }

  .record-jpy span {
    font-size: 10px;
    font-weight: 700;
    color: var(--light-brown);
  }

  /* ── 狀態訊息 ── */
  .empty-state {
    text-align: center;
    padding: 32px 0;
    color: var(--light-brown);
    font-size: 13px;
  }

  .empty-state .empty-icon { font-size: 36px; margin-bottom: 8px; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--brown);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Zen Maru Gothic', sans-serif;
    z-index: 999;
    transition: transform 0.25s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .loading-row {
    text-align: center;
    padding: 20px;
    color: var(--light-brown);
    font-size: 13px;
  }

  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--pink-dark);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="page">

  <!-- 上方輸入區 -->
  <div class="top-section">
    <div class="section-title">✏️ 新增花費</div>
    <div class="form-card">

      <div class="form-row">
        <div class="form-group half">
          <label>日期</label>
          <input type="date" id="inp-date">
        </div>
        <div class="form-group half">
          <label>日幣金額 ¥</label>
          <input type="number" id="inp-jpy" placeholder="0" inputmode="numeric">
        </div>
      </div>

      <div class="form-group">
        <label>項目（中文）</label>
        <input type="text" id="inp-chinese" placeholder="例：便利商店買零食">
      </div>

      <div class="form-group">
        <label>項目原文（可空白）</label>
        <input type="text" id="inp-original" placeholder="例：ローソン">
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitRecord()">
        <span>➕</span> 新增
      </button>

    </div>
  </div>

  <!-- 下方紀錄列表 -->
  <div class="list-section">
    <div class="list-header">
      <div class="list-title">📋 最近紀錄</div>
      <div class="total-badge" id="total-badge">合計 ¥0</div>
    </div>
    <div id="record-list">
      <div class="loading-row"><span class="spinner"></span>載入中…</div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwiDBMaW_iEgPia8GKpU5-j8mgEW474uQjmdD9LsemX0ezZRCqJWZ-p69HY3e1ZWC-k/exec";

  // 設定今天日期
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('inp-date').value = `${yyyy}-${mm}-${dd}`;

  let records = [];

  // 載入紀錄
  async function loadRecords() {
    try {
      const res = await fetch(GAS_URL);
      const data = await res.json();
      if (data.success) {
        records = data.data.reverse(); // 最新的在上面
        renderList();
      } else {
        showError();
      }
    } catch(e) {
      showError();
    }
  }

  function showError() {
    document.getElementById('record-list').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div>載入失敗，請檢查網路</div>`;
  }

  function renderList() {
    const list = document.getElementById('record-list');
    if (records.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">🌸</div>還沒有紀錄哦</div>`;
      document.getElementById('total-badge').textContent = '合計 ¥0';
      return;
    }

    const total = records.reduce((s, r) => s + (Number(r.jpy) || 0), 0);
    document.getElementById('total-badge').textContent = `合計 ¥${total.toLocaleString()}`;

    list.innerHTML = records.map(r => {
      const dateStr = formatDate(r.date);
      return `
        <div class="record-item">
          <div class="record-date">${dateStr}</div>
          <div class="record-divider"></div>
          <div class="record-info">
            <div class="record-chinese">${escHtml(r.chinese || '—')}</div>
            ${r.original ? `<div class="record-original">${escHtml(r.original)}</div>` : ''}
          </div>
          <div class="record-jpy">¥${Number(r.jpy).toLocaleString()}</div>
        </div>
      `;
    }).join('');
  }

  function formatDate(raw) {
    if (!raw) return '—';
    // raw 可能是 "3/8" 或 "2025-03-08" 格式
    const str = String(raw);
    if (str.includes('/')) {
      const parts = str.split('/');
      return `${parts[0]}/${parts[1]}`;
    }
    if (str.includes('-')) {
      const parts = str.split('-');
      return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
    }
    return str;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  // 送出記帳
  async function submitRecord() {
    const date = document.getElementById('inp-date').value;
    const jpy = document.getElementById('inp-jpy').value;
    const chinese = document.getElementById('inp-chinese').value.trim();
    const original = document.getElementById('inp-original').value.trim();

    if (!date || !jpy || !chinese) {
      showToast('⚠️ 請填寫日期、金額和中文項目');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 送出中…';

    // 日期格式轉為 M/D
    const parts = date.split('-');
    const dateFormatted = `${parseInt(parts[1])}/${parseInt(parts[2])}`;

    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          date: dateFormatted,
          original: original,
          chinese: chinese,
          jpy: Number(jpy)
        })
      });
      const data = await res.json();
      if (data.success) {
        // 清空欄位
        document.getElementById('inp-jpy').value = '';
        document.getElementById('inp-chinese').value = '';
        document.getElementById('inp-original').value = '';
        showToast('✅ 已新增！');
        await loadRecords();
      } else {
        showToast('❌ 寫入失敗');
      }
    } catch(e) {
      showToast('❌ 網路錯誤');
    }

    btn.disabled = false;
    btn.innerHTML = '<span>➕</span> 新增';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  loadRecords();
</script>

</body>
</html>
